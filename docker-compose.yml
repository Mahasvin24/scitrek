services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in a root .env file (see .env.docker.example)}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATA_DIR: /data
    volumes:
      - backend_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

volumes:
  backend_data:
